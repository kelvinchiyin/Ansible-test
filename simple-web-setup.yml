---
- name: Multi-Task Setup Playbook
  hosts: all
  connection: local
  gather_facts: false
  tasks:
    - name: Create myproject
      file:
        path: ./myproject
        state: directory
    - name: Create readme
      copy:
        dest: myproject/README.md
        content: "# My Project\nManaged by Ansible"
    - name: Create config.txt
      copy:
        dest: myproject/config.txt
        content: "version=1.0"
    - name: Print completion message
      debug:
        msg: "Project setup complete"
